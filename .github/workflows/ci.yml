name: CI

# Controls when the workflow will run
on:
  # Triggers on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

    # A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  unittest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-latest", "macos-latest", "windows-latest" ]
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - name: Install the project with plotting extra
        run: uv sync --frozen --extra plotting --python ${{ matrix.python-version }}
      - name: Run unit tests with coverage
        shell: bash -l {0}
        run: |
          uv run pytest -c pyproject.toml \
            --cov=clouddrift \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml
      - name: Upload coverage report to Codecov
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
  doctest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-latest" ]
        python-version: [ "3.10" ]
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - name: Install the project
        run: uv sync --frozen --python ${{ matrix.python-version }}
      - name: Run doc tests
        shell: bash -l {0}
        run: uv run pytest --doctest-modules clouddrift/ragged.py
